name: Generate Acquisition PPTX
on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit PPTX to repo? (true/false)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib seaborn python-pptx openpyxl

      - name: Run analysis script
        run: python scripts/acquisition_analysis_with_scenarios.py

      - name: Build presentation
        run: python scripts/make_presentation.py

      - name: Upload PPTX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Acquisition_Insights
          path: docs/Acquisition_Insights.pptx

      - name: Commit generated PPTX (optional)
        if: ${{ github.event.inputs.commit == 'true' }}
        uses: EndBug/add-and-commit@v9
        with:
          author_name: 'github-actions[bot]'
          author_email: '41898282+github-actions[bot]@users.noreply.github.com'
          message: 'chore: add generated Acquisition_Insights.pptx'
          add: 'docs/Acquisition_Insights.pptx'
          signoff: false
